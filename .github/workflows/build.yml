name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace 2>&1 | tee build_output.log

      - name: Save build log on failure
        if: failure()
        run: |
          git config user.email "buildbot@youtube-starter.local"
          git config user.name "build-bot"
          mkdir -p .buildlogs
          tail -n 300 build_output.log > .buildlogs/last_error.log
          git add .buildlogs/last_error.log
          git commit -m "Save build error log [skip ci]" || echo "nothing to commit"
          git push || echo "push failed"

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk youtube-starter.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-starter-apk
          path: youtube-starter.apk

      - name: Publish/Update "latest" release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automatically built APK. Always contains the latest code from main."
          files: youtube-starter.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
